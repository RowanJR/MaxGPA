<!--
File: index.html

Purpose:
Defines the main user interface for the MaxGPA web application.
This file provides the structure of the webpage, including user input
controls and areas where dynamic data is displayed.

System Context:
This file is part of the MaxGPA system. It serves as the frontend view
that users interact with. It works together with app.js (frontend logic)
and app.py (backend API) to display course grade data.

Authors:
- Rowan Moore
- Caeleb Renner
- Jacob Seiberg

Date Created:
04/16/2026

Modifications:
- 04/23/2026: Added initial layout and form controls.
- 04/29/2026: Integrated frontend with backend API.
- 04/30/2026: Improved layout and UI states (loading, error, report).
-->

<!DOCTYPE html>
<html lang="en">

<!-- --------------------------------------------------------------------- -->
<!-- Head Section -->
<!-- --------------------------------------------------------------------- -->

<head>

  <!-- Character encoding for proper text rendering -->
  <meta charset="UTF-8" />

  <!-- Responsive scaling for mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Page title shown in browser tab -->
  <title>MaxGPA</title>

  <!-- Link to external CSS stylesheet -->
  <link rel="stylesheet" href="styles.css">

</head>


<!-- --------------------------------------------------------------------- -->
<!-- Body Section -->
<!-- --------------------------------------------------------------------- -->

<body>

  <!-- ----------------------------------------------------------------- -->
  <!-- Header Section -->
  <!-- Displays application title and subtitle -->
  <!-- ----------------------------------------------------------------- -->

  <header>

    <!-- Main application logo -->
    <div class="logo">Max<em>GPA</em></div>

    <!-- Subtitle describing the application -->
    <div class="header-meta">University of Oregon · Grade Explorer</div>

  </header>


  <!-- ----------------------------------------------------------------- -->
  <!-- Input Controls -->
  <!-- Allows user to select major and academic years -->
  <!-- ----------------------------------------------------------------- -->

  <div class="controls">

    <!-- Major selection dropdown -->
    <div class="field">
      <label for="major-select">Major</label>

      <!-- Dropdown menu for selecting a major -->
      <select id="major-select">
        <option value="">— Select a major —</option>
        <option value="cs_bs">BS Computer Science</option>
        <option value="ba_business">BA Business Administration</option>
        <option value="geog_bs">BS Geography</option>
      </select>
    </div>


    <!-- Academic year selection -->
    <div class="field">
      <label>Academic years</label>

      <div class="year-pair">

        <!-- Start year dropdown -->
        <select id="year-from">
          <option value="2016">AY 2016</option>
          <option value="2017">AY 2017</option>
          <option value="2018">AY 2018</option>
          <option value="2019" selected>AY 2019</option>
          <option value="2020">AY 2020</option>
          <option value="2021">AY 2021</option>
        </select>

        <!-- Separator between years -->
        <span class="year-sep">–</span>

        <!-- End year dropdown -->
        <select id="year-to">
          <option value="2021">AY 2021</option>
          <option value="2022">AY 2022</option>
          <option value="2023" selected>AY 2023</option>
          <option value="2024">AY 2024</option>
          <option value="2025">AY 2025</option>
        </select>

      </div>
    </div>


    <!-- Button to trigger report generation -->
    <button class="btn-generate" id="btn-generate" onclick="handleGenerate()">
      Generate report
    </button>

  </div>


  <!-- ----------------------------------------------------------------- -->
  <!-- Main Content Area -->
  <!-- Displays different UI states and generated report -->
  <!-- ----------------------------------------------------------------- -->

  <main>

    <!-- Empty state shown before user generates report -->
    <div class="state-box visible" id="state-empty">
      <div class="icon"></div>
      <p>Select a above and click <strong>Generate report</strong><br>
         to see grade distributions by course and instructor.</p>
    </div>


    <!-- Loading state shown while data is being fetched -->
    <div class="state-box" id="state-loading">
      <div id="skeleton-area"></div>
    </div>


    <!-- Error state shown if API request fails -->
    <div class="state-box" id="state-error">
      <div class="icon">⚠</div>
      <p>Could not load data from the server.</p>
      <p class="err" id="error-message"></p>
    </div>


    <!-- Report metadata (title and subtitle) -->
    <div id="report-meta" class="report-meta">
      <h2 id="report-title"></h2>
      <p id="report-subtitle"></p>
    </div>


    <!-- Legend explaining grade colors -->
    <div class="legend" id="legend">

      <div class="legend-item">
        <div class="legend-swatch" style="background:var(--green-light)"></div>A
      </div>

      <div class="legend-item">
        <div class="legend-swatch" style="background:var(--blue)"></div>B
      </div>

      <div class="legend-item">
        <div class="legend-swatch" style="background:var(--amber)"></div>C
      </div>

      <div class="legend-item">
        <div class="legend-swatch" style="background:var(--red)"></div>DNF
      </div>

    </div>


    <!-- Container where course cards will be dynamically inserted -->
    <div id="course-list"></div>

  </main>


  <!-- ----------------------------------------------------------------- -->
  <!-- JavaScript -->
  <!-- Links frontend logic to the page -->
  <!-- ----------------------------------------------------------------- -->

  <script src="app.js"></script>

</body>
</html>
