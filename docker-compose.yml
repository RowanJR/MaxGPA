services:
  web:
    build: .
    command: app.py
    working_dir: /app
    ports:
      - "5001:5000"
    depends_on:
      - db
    volumes:
      - .:/app

  db:
    image: mongo:6
    ports:
      - "27017:27017"

  importer:
    build: .
    command: import_csv.py --yes
    working_dir: /app
    depends_on:
      - db
    volumes:
      - .:/app
