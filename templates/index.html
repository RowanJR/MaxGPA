<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MaxGPA</title>
  <link rel="stylesheet" href="static/css/styles.css">

</head>
<body>

  <header>
    <div class="logo">Max<em>GPA</em></div>
    <div class="header-meta">University of Oregon · Grade Explorer</div>
  </header>

  <div class="controls">
    <div class="field">
      <label for="major-select">Major</label>
      <select id="major-select">
        <option value="">— Select a major —</option>
        <option value="cs_bs">BS Computer Science</option>
        <option value="bs_business">BS Business Administration</option>
        <option value="geog_bs">BS Physics</option>
      </select>
    </div>

    <div class="field">
      <label>Academic years</label>
      <div class="year-pair">
        <select id="year-from">
          <option value="2016">AY 2016</option>
          <option value="2017">AY 2017</option>
          <option value="2018">AY 2018</option>
          <option value="2019" selected>AY 2019</option>
          <option value="2020">AY 2020</option>
          <option value="2021">AY 2021</option>
        </select>
        <span class="year-sep">–</span>
        <select id="year-to">
          <option value="2021">AY 2021</option>
          <option value="2022">AY 2022</option>
          <option value="2023" selected>AY 2023</option>
          <option value="2024">AY 2024</option>
          <option value="2025">AY 2025</option>
        </select>
      </div>
    </div>

    <button class="btn-generate" id="btn-generate" onclick="handleGenerate()">
      Generate report
    </button>
  </div>

  <main>
    <!-- Empty state (shown on load) -->
    <div class="state-box visible" id="state-empty">
      <div class="icon"></div>
      <p>Select a major above and click <strong>Generate report</strong><br>to see grade distributions by course and instructor.</p>
    </div>

    <!-- Loading state -->
    <div class="state-box" id="state-loading">
      <div id="skeleton-area"></div>
    </div>

    <!-- Error state -->
    <div class="state-box" id="state-error">
      <div class="icon">⚠</div>
      <p>Could not load data from the server.</p>
      <p class="err" id="error-message"></p>
    </div>

    <!-- Report output -->
    <div id="report-meta" class="report-meta">
      <h2 id="report-title"></h2>
      <p id="report-subtitle"></p>
    </div>

    <div class="legend" id="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--green-light)"></div>A</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--blue)"></div>B</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--amber)"></div>C</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--red)"></div>DNF</div>
    </div>

    <div id="course-list"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
